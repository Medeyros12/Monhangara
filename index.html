<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla 2D Sandbox Editor</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a1a;
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column;
        }

        /* Top Bar */
        #topBar {
            height: 40px; background: #2a2a2a;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; border-bottom: 1px solid #3a3a3a;
        }

        /* Main Workspace Layout */
        #workspace {
            display: flex; flex: 1; overflow: hidden;
        }

        /* Side Panels */
        .panel {
            width: 250px; background: #222;
            border-right: 1px solid #3a3a3a; display: flex;
            flex-direction: column; padding: 10px; box-sizing: border-box;
        }
        #rightPanel { border-right: none; border-left: 1px solid #3a3a3a; }
        
        .panel h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .panel-section { margin-bottom: 15px; }

        /* Center Area (Preview/Code) */
        #centerArea {
            flex: 1; display: flex; flex-direction: column;
            background: black; position: relative;
        }

        /* Tabs */
        #tabs {
            height: 35px; display: flex; background: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
        }
        .tab {
            padding: 0 20px; display: flex; align-items: center;
            cursor: pointer; border-right: 1px solid #3a3a3a;
            background: #2a2a2a; user-select: none;
        }
        .tab.active { background: #333; font-weight: bold; }
        #tab-preview.active { border-top: 3px solid #4a90e2; } /* Blue highlight for Preview */
        #tab-code.active { border-top: 3px solid #d0021b; }    /* Red highlight for Code */

        /* Content Areas */
        #canvasContainer, #codeContainer {
            flex: 1; position: relative; overflow: hidden; display: none;
        }
        #canvasContainer.active, #codeContainer.active { display: block; }

        canvas { display: block; width: 100%; height: 100%; }

        /* Code Editor Simulation */
        #codeEditor {
            width: 100%; height: 100%; background: #1e1e1e;
            color: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px; border: none; padding: 10px;
            box-sizing: border-box; resize: none; outline: none;
        }

        /* Object Type List */
        .object-type-item {
            display: flex; align-items: center; padding: 5px;
            cursor: pointer; border-radius: 4px; margin-bottom: 2px;
        }
        .object-type-item:hover { background: #333; }
        .object-type-item.selected { background: #444; border: 1px solid #666; }
        .object-type-icon {
            width: 24px; height: 24px; border: 1px solid #555;
            margin-right: 10px; background-size: cover;
        }

        /* Properties Inputs */
        .prop-group { margin-bottom: 8px; display: flex; align-items: center; }
        .prop-group label { width: 80px; font-size: 13px; color: #aaa; }
        .prop-group input {
            flex: 1; background: #333; border: 1px solid #444;
            color: white; padding: 4px; border-radius: 3px;
        }

    </style>
</head>
<body>

    <div id="topBar">
        <span>Vanilla 2D Sandbox Editor</span>
        <div>
            <button id="btn-save">Salvar Jogo</button>
            <button id="btn-run" style="background: #4caf50; color: white;">Rodar</button>
        </div>
    </div>

    <div id="workspace">
        
        <div id="leftPanel" class="panel">
            <h3>Propriedades</h3>
            <div id="no-selection" style="color: #888; font-style: italic;">Nenhum objeto selecionado</div>
            <div id="properties-form" style="display: none;">
                <div class="prop-group">
                    <label>Tipo:</label>
                    <span id="prop-type-name">Grama</span>
                </div>
                <div class="prop-group">
                    <label>Posição X:</label>
                    <input type="number" id="prop-x">
                </div>
                <div class="prop-group">
                    <label>Posição Y:</label>
                    <input type="number" id="prop-y">
                </div>
                <button id="btn-delete-object" style="margin-top: 10px; background: #d32f2f; color: white; width: 100%;">Deletar Objeto</button>
            </div>
        </div>

        <div id="centerArea">
            <div id="tabs">
                <div id="tab-preview" class="tab active">Preview</div>
                <div id="tab-code" class="tab">Código</div>
            </div>

            <div id="canvasContainer" class="active">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div id="codeContainer">
                <textarea id="codeEditor" spellcheck="false"></textarea>
            </div>
        </div>

        <div id="rightPanel" class="panel">
            <div class="panel-section">
                <h3>Tipos de Objetos</h3>
                <div id="object-type-list">
                    </div>
                <button style="margin-top: 5px; width: 100%;">+ Novo Tipo</button>
            </div>
            
            <div class="panel-section" style="border-top: 1px solid #444; padding-top: 10px;">
                <h3>Arquivos do Jogo</h3>
                <div style="font-size: 13px; color: #aaa; font-family: monospace;">
                    <div>Raiz/</div>
                    <div style="padding-left: 15px;">engine.js</div>
                    <div style="padding-left: 15px;">index.html</div>
                    <div style="padding-left: 15px; color: white; font-weight: bold;">game/</div>
                    <div style="padding-left: 30px; color: #4a90e2;">main.js*</div>
                    <div style="padding-left: 30px;">assets/</div>
                    <div style="padding-left: 45px;">blocos/</div>
                    <div style="padding-left: 60px; color: #8bc34a;">grass.png</div>
                    <div style="padding-left: 60px; color: #795548;">dirt.png</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="engine.js"></script>
    
    <script>
        // Start of code segment generated by Google Gemini 3.1 Pro

        // --- MOCK GAME CODE (This is what the dev would edit) ---
        // Ordinarily, this would be loaded from a separate file.
        const defaultGameCode = `
// Game Setup
game.config.gridMode = 'iso';
game.config.gridSize = 64;

// Define available block types
game.defineObjectType('grama', {
    name: 'Bloco de Grama',
    textures: {
        top: 'game/assets/blocos/grass_top.png', // We'll create these as colors for this demo
        sides: 'game/assets/blocos/dirt_side.png'
    }
});

game.defineObjectType('pedra', {
    name: 'Bloco de Pedra',
    textures: {
        all: 'game/assets/blocos/stone.png'
    }
});

game.defineObjectType('madeira', {
    name: 'Tronco de Madeira',
    textures: {
        side: 'game/assets/blocos/wood_side.png',
        top: 'game/assets/blocos/wood_top.png'
    }
});

// Initial scene setup
game.addObject('grama', 0, 0);
game.addObject('grama', 1, 0);
game.addObject('pedra', 0, 1);

// Input Handling
game.onMouseClick = (worldCoords) => {
    // If an object is clicked, select it.
    const clickedObj = game.getObjectAt(worldCoords.x, worldCoords.y);
    if (clickedObj) {
        editor.selectObject(clickedObj);
        return; 
    }

    // Otherwise, place the currently selected TYPE from the palette
    const selectedTypeId = editor.getSelectedType();
    if (selectedTypeId) {
        game.addObject(selectedTypeId, worldCoords.x, worldCoords.y);
    }
};

game.onRightClick = (worldCoords) => {
    game.removeObjectAt(worldCoords.x, worldCoords.y);
    editor.clearSelection();
};
`;
        // --- End of Mock Game Code ---

        // Initialize Engine
        const game = new SandboxEngine('gameCanvas');

        // Simple Texture Creator helper for the demo (since we have no real asset files)
        const createMockTexture = (color, name) => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color; ctx.fillRect(0, 0, 64, 64);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, 64, 64);
            
            // For the demo, we'll store the color to use as an icon
            return { img: canvas, color: color, path: 'game/assets/blocos/' + name + '.png' };
        };

        // Populate Mock Textures for the demo to run without files
        const textures = {
            grass_top: createMockTexture('#8bc34a', 'grass_top'),
            dirt_side: createMockTexture('#795548', 'dirt_side'),
            stone: createMockTexture('#9e9e9e', 'stone'),
            wood_top: createMockTexture('#d7ccc8', 'wood_top'),
            wood_side: createMockTexture('#a1887f', 'wood_side')
        };

        // Replace the default drawIsoCube with one that handles our mock texture objects
        const originalDrawIsoCube = game.drawIsoCube.bind(game);
        game.drawIsoCube = function(x, y, size, topTx, leftTx, rightTx) {
            originalDrawIsoCube(x, y, size, topTx?.img, leftTx?.img, rightTx?.img);
        };

        // --- EDITOR LOGIC ---
        const editor = {
            selectedObject: null,
            selectedTypeId: 'grama',
            objectTypes: {},

            init: function() {
                // Set up Tabs
                document.getElementById('tab-preview').addEventListener('click', () => this.setTab('preview'));
                document.getElementById('tab-code').addEventListener('click', () => this.setTab('code'));

                // Initialize Code Editor
                const codeEditor = document.getElementById('codeEditor');
                codeEditor.value = defaultGameCode.trim();

                // Run the code initially
                this.runCode();

                document.getElementById('btn-run').addEventListener('click', () => this.runCode());

                // Properties Panel Inputs
                document.getElementById('prop-x').addEventListener('input', (e) => this.updateSelectedObject('x', e.target.value));
                document.getElementById('prop-y').addEventListener('input', (e) => this.updateSelectedObject('y', e.target.value));
                document.getElementById('btn-delete-object').addEventListener('click', () => this.deleteSelectedObject());
            },

            setTab: function(tabName) {
                document.querySelectorAll('.tab, #centerArea > div:not(#tabs)').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + tabName).classList.add('active');
                document.getElementById(tabName + 'Container').classList.add('active');
            },

            runCode: function() {
                const code = document.getElementById('codeEditor').value;
                game.reset(); // Need to implement this in engine.js to clear state
                this.objectTypes = {};
                this.clearSelection();

                try {
                    // Inject a helper function for the game code to use
                    game.defineObjectType = (id, def) => this.defineObjectType(id, def);
                    
                    // Simple eval for demo purposes. In a real app, use a safer method or sandbox.
                    eval(code); 
                    
                    this.populateObjectTypeList();
                    console.log("Código executado com sucesso.");
                    this.setTab('preview');
                } catch (e) {
                    console.error("Erro ao executar o código do jogo:", e);
                    alert("Erro no código. Verifique o console.");
                }
            },

            defineObjectType: function(id, def) {
                // In a real scenario, we'd load images from def.textures path.
                // Here we map to our mock textures.
                let top, sides;
                
                if (def.textures.all) {
                    const tx = textures[def.textures.all.split('/').pop().split('.')[0]];
                    top = sides = tx;
                } else {
                    top = textures[def.textures.top.split('/').pop().split('.')[0]];
                    sides = textures[def.textures.sides.split('/').pop().split('.')[0]];
                }

                this.objectTypes[id] = {
                    id: id,
                    name: def.name,
                    iconColor: top.color, // Use top texture color as icon
                    render: (ctx, x, y, size) => game.drawIsoCube(x, y, size, top, sides, sides)
                };
            },

            populateObjectTypeList: function() {
                const list = document.getElementById('object-type-list');
                list.innerHTML = '';
                for (const id in this.objectTypes) {
                    const type = this.objectTypes[id];
                    const item = document.createElement('div');
                    item.className = 'object-type-item' + (id === this.selectedTypeId ? ' selected' : '');
                    item.onclick = () => this.selectType(id);
                    item.innerHTML = `
                        <div class="object-type-icon" style="background-color: ${type.iconColor}"></div>
                        <span>${type.name}</span>
                    `;
                    list.appendChild(item);
                }
            },

            selectType: function(id) {
                this.selectedTypeId = id;
                this.populateObjectTypeList(); // Redraw to update selection state
                this.clearSelection(); // Deselect any object when picking a new type to place
            },

            getSelectedType: function() { return this.selectedTypeId; },

            // --- Selection / Properties Logic ---
            selectObject: function(obj) {
                this.selectedObject = obj;
                document.getElementById('no-selection').style.display = 'none';
                document.getElementById('properties-form').style.display = 'block';
                
                const type = this.objectTypes[obj.typeId];
                document.getElementById('prop-type-name').innerText = type ? type.name : 'Desconhecido';
                document.getElementById('prop-x').value = Math.round(obj.x);
                document.getElementById('prop-y').value = Math.round(obj.y);
            },

            clearSelection: function() {
                this.selectedObject = null;
                document.getElementById('no-selection').style.display = 'block';
                document.getElementById('properties-form').style.display = 'none';
                game.setSelectionHighlight(null); // implement in engine.js
            },

            updateSelectedObject: function(prop, value) {
                if (this.selectedObject) {
                    this.selectedObject[prop] = parseFloat(value);
                    game.requestSort(); // implement in engine.js to keep sorting correct
                }
            },
            
            deleteSelectedObject: function() {
                if(this.selectedObject) {
                    game.removeObject(this.selectedObject);
                    this.clearSelection();
                }
            }
        };

        editor.init();

        // --- ENGINE EXTENSIONS (Required for the editor to work) ---
        // We add these methods to the existing SandboxEngine class from your engine.js file.

        // Clear all objects, input handlers, and configurations.
        SandboxEngine.prototype.reset = function() {
            this.objects = [];
            this.config = { gridMode: 'free', gridSize: 64 };
            this.onMouseClick = null;
            this.onRightClick = null;
            this.selectedObjectForHighlight = null;
        };
        
        // Add object by type ID
        SandboxEngine.prototype.addObject = function(typeId, worldX, worldY) {
            const type = editor.objectTypes[typeId];
            if (!type) return;

            const newObj = {
                typeId: typeId,
                x: worldX, y: worldY,
                render: function(ctx, engine) {
                    type.render(ctx, this.x, this.y, engine.config.gridSize);
                    // Draw selection highlight if this object is selected
                    if(this === engine.selectedObjectForHighlight) {
                        ctx.strokeStyle = '#4a90e2'; ctx.lineWidth = 3;
                        // Rough hexagonal outline for highlight
                        ctx.beginPath();
                        ctx.moveTo(0, -engine.config.gridSize);
                        ctx.lineTo(engine.config.gridSize * 0.866, -engine.config.gridSize/2);
                        // ... complete the hexagon outline ... (skipped for brevity)
                        ctx.closePath(); ctx.stroke();
                    }
                }
            };
            this.objects.push(newObj);
            this.requestSort();
        };

        // Helper to find object at coordinates
        SandboxEngine.prototype.getObjectAt = function(x, y) {
            const size = this.config.gridSize / 2;
            // Iterate backwards (top-most objects first)
            for (let i = this.objects.length - 1; i >= 0; i--) {
                const obj = this.objects[i];
                if (Math.abs(obj.x - x) < size && Math.abs(obj.y - y) < size) {
                    return obj;
                }
            }
            return null;
        };

        SandboxEngine.prototype.removeObject = function(obj) {
            this.objects = this.objects.filter(o => o !== obj);
        };
        
        SandboxEngine.prototype.setSelectionHighlight = function(obj) { this.selectedObjectForHighlight = obj; };
        SandboxEngine.prototype.requestSort = function() { this.objects.sort((a, b) => a.y - b.y); };

        // End of code segment generated by Google Gemini 3.1 Pro
    </script>
</body>
</html>
