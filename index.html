<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla 2D Sandbox IDE</title>
    <style>
        /* IDE Styles (Not the Game's CSS) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a1a;
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column;
        }

        #topBar {
            height: 40px; background: #2a2a2a;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; border-bottom: 1px solid #3a3a3a;
        }

        #workspace { display: flex; flex: 1; overflow: hidden; }

        .panel {
            width: 280px; background: #222;
            border-right: 1px solid #3a3a3a; display: flex;
            flex-direction: column; padding: 10px; box-sizing: border-box;
            overflow-y: auto;
        }
        #rightPanel { border-right: none; border-left: 1px solid #3a3a3a; }
        
        .panel h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; font-size: 14px; color: #ccc;}
        .panel-section { margin-bottom: 15px; }

        #centerArea {
            flex: 1; display: flex; flex-direction: column;
            background: #000; position: relative;
        }

        #tabs {
            height: 35px; display: flex; background: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
        }
        .tab {
            padding: 0 15px; display: flex; align-items: center;
            cursor: pointer; border-right: 1px solid #3a3a3a;
            background: #2a2a2a; user-select: none; font-size: 13px;
        }
        .tab.active { background: #333; font-weight: bold; }
        #tab-preview.active { border-top: 3px solid #4a90e2; }
        #tab-js.active { border-top: 3px solid #f1e05a; }
        #tab-html.active { border-top: 3px solid #e34c26; }
        #tab-css.active { border-top: 3px solid #563d7c; }

        .editor-container {
            flex: 1; position: relative; overflow: hidden; display: none;
        }
        .editor-container.active { display: block; }

        textarea.code-editor {
            width: 100%; height: 100%; background: #1e1e1e;
            color: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px; border: none; padding: 10px;
            box-sizing: border-box; resize: none; outline: none;
        }

        /* Object Type List */
        .object-type-item {
            display: flex; align-items: center; padding: 8px;
            cursor: pointer; border-radius: 4px; margin-bottom: 4px;
            background: #2a2a2a; border: 1px solid transparent;
        }
        .object-type-item:hover { background: #333; }
        .object-type-item.selected { background: #444; border-color: #666; }
        .object-type-icon {
            width: 20px; height: 20px; border: 1px solid #555;
            margin-right: 10px; background-color: #f0f; /* fallback */
        }

        /* Properties Form */
        .prop-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .prop-group label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .prop-group input {
            background: #333; border: 1px solid #444;
            color: white; padding: 6px; border-radius: 3px; font-family: monospace;
        }
        
        button {
            background: #444; color: white; border: 1px solid #555;
            padding: 6px 12px; cursor: pointer; border-radius: 3px;
        }
        button:hover { background: #555; }
        .btn-primary { background: #4caf50; border-color: #388e3c; }
        .btn-primary:hover { background: #43a047; }
        .btn-danger { background: #d32f2f; border-color: #b71c1c; }

        /* --- PREVIEW AREA OVERLAYS --- */
        #game-preview-wrapper {
            position: relative; width: 100%; height: 100%;
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }
        /* The UI created by the Dev for the Player will be injected here */
        #player-ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas by default */
        }
        /* We'll inject player CSS inside the iframe or style tag */

    </style>
</head>
<body>

    <div id="topBar">
        <span>Vanilla 2D Sandbox IDE</span>
        <div>
            <button class="btn-primary" id="btn-run">▶ Rodar (F5)</button>
        </div>
    </div>

    <div id="workspace">
        
        <div id="leftPanel" class="panel">
            <h3>Editor de Tipo de Objeto</h3>
            <div id="no-type-selection" style="color: #888; font-size: 13px; font-style: italic;">Selecione um tipo na lista à direita para editar.</div>
            
            <div id="type-editor-form" style="display: none;">
                <div class="prop-group">
                    <label>ID Interno (ex: block_grass)</label>
                    <input type="text" id="type-id" readonly title="ID não pode ser alterado após criação">
                </div>
                <div class="prop-group">
                    <label>Nome de Exibição</label>
                    <input type="text" id="type-name">
                </div>
                <div class="prop-group">
                    <label>URL Textura Topo</label>
                    <input type="text" id="type-tex-top" placeholder="assets/tex_top.png">
                </div>
                <div class="prop-group">
                    <label>URL Textura Esquerda</label>
                    <input type="text" id="type-tex-left" placeholder="assets/tex_left.png">
                </div>
                <div class="prop-group">
                    <label>URL Textura Direita</label>
                    <input type="text" id="type-tex-right" placeholder="assets/tex_right.png">
                </div>
                <div style="display: flex; gap: 5px; margin-top: 15px;">
                    <button id="btn-save-type" style="flex: 1;" class="btn-primary">Salvar Alterações</button>
                </div>
                <button id="btn-delete-type" style="margin-top: 10px; width: 100%;" class="btn-danger">Excluir Tipo</button>
            </div>
        </div>

        <div id="centerArea">
            <div id="tabs">
                <div id="tab-preview" class="tab active">Preview</div>
                <div id="tab-js" class="tab">game/main.js</div>
                <div id="tab-html" class="tab">game/ui.html</div>
                <div id="tab-css" class="tab">game/style.css</div>
            </div>

            <div id="previewContainer" class="editor-container active">
                <div id="game-preview-wrapper">
                    <canvas id="gameCanvas"></canvas>
                    <div id="player-ui-layer"></div>
                </div>
            </div>

            <div id="jsContainer" class="editor-container">
                <textarea id="editor-js" class="code-editor" spellcheck="false"></textarea>
            </div>
            <div id="htmlContainer" class="editor-container">
                <textarea id="editor-html" class="code-editor" spellcheck="false"></textarea>
            </div>
            <div id="cssContainer" class="editor-container">
                <textarea id="editor-css" class="code-editor" spellcheck="false"></textarea>
            </div>
        </div>

        <div id="rightPanel" class="panel">
            <div class="panel-section">
                <h3>Tipos de Objetos</h3>
                <div id="object-type-list">
                    </div>
                <button id="btn-new-type" style="margin-top: 10px; width: 100%;">+ Criar Novo Tipo</button>
            </div>
        </div>
    </div>
    
    <style id="player-custom-styles"></style>

    <script src="engine.js"></script>
    
    <script>
        // Start of code segment generated by Google Gemini 3.1 Pro

        // --- IDE STATE ---
        const ide = {
            selectedTypeId: null,
            
            // This represents the internal database of block types the dev creates via the UI
            objectTypes: {
                'block_grass': { id: 'block_grass', name: 'Grama', texTop: '#8bc34a', texLeft: '#795548', texRight: '#5d4037' },
                'block_stone': { id: 'block_stone', name: 'Pedra', texTop: '#9e9e9e', texLeft: '#757575', texRight: '#616161' }
            },

            // Default Game Files (What the dev writes)
            files: {
                js: `
// --- main.js ---
// Get player UI elements
const uiTitle = document.getElementById('ui-title');
// Example of how the dev's code interacts with the engine:
game.config.gridMode = 'iso';

// Generate some initial world
game.addObject('block_stone', 0, 0);
game.addObject('block_grass', 0, 1);

game.onMouseClick = (worldCoords) => {
    // Logic for placing the currently active block from Player UI
    // In a real scenario, this would read from a JS variable updated by the HTML UI clicks
    game.addObject('block_grass', worldCoords.x, worldCoords.y);
};
                `.trim(),
                html: `
<div class="hotbar">
    <div id="ui-title">Minha Hotbar</div>
    <button class="slot" onclick="console.log('Grama selecionada')">G</button>
    <button class="slot" onclick="console.log('Pedra selecionada')">P</button>
</div>
                `.trim(),
                css: `
/* --- style.css --- */
/* Styling for the PLAYER's UI */
.hotbar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 10px;
    border-radius: 8px;
    display: flex;
    gap: 5px;
    pointer-events: auto; /* Required to make UI clickable over canvas */
    border: 2px solid #555;
}
.hotbar #ui-title {
    position: absolute; top: -25px; left: 0; color: white;
}
.slot {
    width: 40px; height: 40px; background: #888;
    border: 2px solid #aaa; cursor: pointer; color: white;
}
.slot:hover { border-color: #fff; }
                `.trim()
            },

            init: function() {
                // Setup Tabs
                const tabs = ['preview', 'js', 'html', 'css'];
                tabs.forEach(tab => {
                    document.getElementById('tab-' + tab).addEventListener('click', () => this.switchTab(tab));
                });

                // Load initial code into textareas
                document.getElementById('editor-js').value = this.files.js;
                document.getElementById('editor-html').value = this.files.html;
                document.getElementById('editor-css').value = this.files.css;

                // Setup Run Button
                document.getElementById('btn-run').addEventListener('click', () => this.runGame());

                // Setup Type Editor Buttons
                document.getElementById('btn-save-type').addEventListener('click', () => this.saveSelectedType());
                document.getElementById('btn-delete-type').addEventListener('click', () => this.deleteSelectedType());
                document.getElementById('btn-new-type').addEventListener('click', () => this.createNewType());

                this.renderTypeList();
                this.runGame(); // Initial run
            },

            switchTab: function(tabName) {
                document.querySelectorAll('.tab, .editor-container').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + tabName).classList.add('active');
                document.getElementById(tabName + 'Container').classList.add('active');
            },

            renderTypeList: function() {
                const list = document.getElementById('object-type-list');
                list.innerHTML = '';
                for (const id in this.objectTypes) {
                    const type = this.objectTypes[id];
                    const item = document.createElement('div');
                    item.className = 'object-type-item' + (id === this.selectedTypeId ? ' selected' : '');
                    item.onclick = () => this.selectType(id);
                    // Using Top Texture as color fallback for icon in IDE
                    item.innerHTML = `
                        <div class="object-type-icon" style="background-color: ${type.texTop}"></div>
                        <span>${type.name}</span>
                    `;
                    list.appendChild(item);
                }
            },

            selectType: function(id) {
                this.selectedTypeId = id;
                this.renderTypeList();
                
                const type = this.objectTypes[id];
                document.getElementById('no-type-selection').style.display = 'none';
                document.getElementById('type-editor-form').style.display = 'block';
                
                document.getElementById('type-id').value = type.id;
                document.getElementById('type-name').value = type.name;
                document.getElementById('type-tex-top').value = type.texTop;
                document.getElementById('type-tex-left').value = type.texLeft;
                document.getElementById('type-tex-right').value = type.texRight;
            },

            saveSelectedType: function() {
                if (!this.selectedTypeId) return;
                const type = this.objectTypes[this.selectedTypeId];
                type.name = document.getElementById('type-name').value;
                type.texTop = document.getElementById('type-tex-top').value;
                type.texLeft = document.getElementById('type-tex-left').value;
                type.texRight = document.getElementById('type-tex-right').value;
                this.renderTypeList();
            },

            createNewType: function() {
                const newId = 'block_' + Date.now();
                this.objectTypes[newId] = {
                    id: newId, name: 'Novo Bloco', texTop: '#fff', texLeft: '#ccc', texRight: '#999'
                };
                this.renderTypeList();
                this.selectType(newId);
            },

            deleteSelectedType: function() {
                if (!this.selectedTypeId) return;
                if(confirm("Tem certeza que deseja deletar o tipo: " + this.objectTypes[this.selectedTypeId].name + "?")) {
                    delete this.objectTypes[this.selectedTypeId];
                    this.selectedTypeId = null;
                    document.getElementById('no-type-selection').style.display = 'block';
                    document.getElementById('type-editor-form').style.display = 'none';
                    this.renderTypeList();
                }
            },

            // --- The core method that runs the dev's game ---
            runGame: function() {
                // 1. Fetch current code from textareas
                const jsCode = document.getElementById('editor-js').value;
                const htmlCode = document.getElementById('editor-html').value;
                const cssCode = document.getElementById('editor-css').value;

                // 2. Inject Dev's HTML into the Player UI Layer
                const uiLayer = document.getElementById('player-ui-layer');
                uiLayer.innerHTML = htmlCode;

                // 3. Inject Dev's CSS
                const styleTag = document.getElementById('player-custom-styles');
                styleTag.innerHTML = cssCode;

                // 4. Reset and configure Engine based on IDE's Object Types
                if(typeof game !== 'undefined') {
                    game.reset(); // Assuming reset clears the map
                    // Here we would pass the IDE's object types to the engine
                    // For the mock, we pretend the engine understands these texture colors
                    game.registeredTypes = this.objectTypes; 
                }

                // 5. Execute Dev's JS
                try {
                    // Note: In a real production IDE, consider using an <iframe> or Web Workers 
                    // for security to sandbox the eval code.
                    const runContext = new Function(jsCode);
                    runContext();
                    
                    console.log("Jogo compilado e rodando com sucesso.");
                    this.switchTab('preview');
                } catch (e) {
                    console.error("Erro no script do jogo:", e);
                    alert("Erro no código main.js. Verifique o console.");
                }
            }
        };

        // Assume game is instantiated from engine.js globally
        // const game = new SandboxEngine('gameCanvas');
        
        // Initialize the IDE
        window.onload = () => ide.init();

        // End of code segment generated by Google Gemini 3.1 Pro
    </script>
</body>
</html>
